# docker-compose.yml
# This file defines how to run the Firco XGBoost API using Docker Compose.
# It simplifies running the container and managing its configuration.

version: '3.8'

services:
  # Define the API service
  firco-xgb-api:
    # Tell Docker Compose to build the image from the Dockerfile in the current directory
    build: .
    # Name the container for easy identification
    container_name: firco-xgb-api
    # Map port 3004 on the host to port 3004 in the container
    # This allows you to access the API from your browser or other tools.
    ports:
      - "3004:3004"
    # Restart policy: automatically restart the container if it crashes
    restart: unless-stopped 